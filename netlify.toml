[build]
  publish = "."
  command = "echo 'Static site — no build step'"

# Netlify Forms — detected from educate/index.html on deploy

[[redirects]]
  from = "/action"
  to = "/action/"
  status = 301

[[redirects]]
  from = "/builds"
  to = "/builds/"
  status = 301

[[redirects]]
  from = "/library"
  to = "/library/"
  status = 301

[[redirects]]
  from = "/halls"
  to = "/halls/"
  status = 301

[[redirects]]
  from = "/educate"
  to = "/educate/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

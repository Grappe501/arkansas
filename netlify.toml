[build]
  publish = "."
  command = "echo 'Static site — no build step'"

[[redirects]]
  from = "/entries/*"
  to = "/entries/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
